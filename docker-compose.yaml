services:
  tele-download:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tele-download
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DOWNLOAD_DIR: /tmp/tele-download
      HTTP_PORT: ${HTTP_PORT:-3000}
      FFMPEG_PATH: /usr/bin/ffmpeg
      FFPROBE_PATH: /usr/bin/ffprobe
    ports:
      - "${HTTP_PORT:-3000}:${HTTP_PORT:-3000}"
    volumes:
      - tele-download-data:/tmp/tele-download

volumes:
  tele-download-data:
